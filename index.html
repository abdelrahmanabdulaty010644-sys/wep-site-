<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdelrahman Mohamed | Data Analyst Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #04080e;
            --card-glass: rgba(13, 27, 42, 0.65);
            --card-border: rgba(0, 119, 181, 0.2);
            --text-main: #ffffff;
            --text-muted: #cbd5e0;
            --primary: #0077B5;
            --primary-glow: rgba(0, 119, 181, 0.35);
            --accent: #00b4d8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0, 119, 181, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 119, 181, 0.04) 1px, transparent 1px),
                linear-gradient(0deg, rgba(0, 180, 216, 0.02) 20%, transparent 20%, transparent 40%, rgba(0, 119, 181, 0.03) 40%, rgba(0, 119, 181, 0.03) 70%, transparent 70%),
                radial-gradient(circle at 50% 10%, rgba(0, 119, 181, 0.15), transparent 50%);
            background-size: 40px 40px, 40px 40px, 120px 100%, 100% 100%;
            color: var(--text-main);
            line-height: 1.6;
            backdrop-filter: blur(1px);
        }

        header {
            padding: 4rem 1rem 3rem 1rem;
            text-align: center;
            position: relative;
        }

        .profile-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 1.5rem auto;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px var(--primary-glow);
            position: relative;
            z-index: 2;
        }

        .profile-container::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 1px dashed var(--accent);
            animation: rotate-clockwise 20s linear infinite;
        }

        @keyframes rotate-clockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .profile-title {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #a5d8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-subtitle {
            color: var(--accent);
            font-size: 1.4rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .profile-subtitle::before, .profile-subtitle::after {
            content: '';
            width: 30px;
            height: 2px;
            background-color: var(--primary);
        }

        .container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        section {
            margin-bottom: 5rem;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        h2 i {
            color: var(--accent);
            font-size: 1.6rem;
        }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .about-box p {
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            text-align: justify;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-top: 2rem;
        }

        .skill-card {
            background: rgba(4, 8, 14, 0.5);
            border: 1px solid rgba(0, 119, 181, 0.1);
            padding: 1.25rem;
            text-align: center;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .skill-card:hover {
            border-color: var(--accent);
            background: rgba(0, 119, 181, 0.1);
            transform: translateY(-2px);
        }

        .skill-card i {
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 0.75rem;
            display: block;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2.5rem;
        }

        .project-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 12px 24px rgba(0, 119, 181, 0.25);
        }

            width: 100%;
            height: 200px;
            overflow: hidden
